<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGP Report Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            line-height: normal;
        }

        table {
            display: table;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        tbody {
            margin: 0;
            padding: 0;

        }

        td, tr {
            margin: 0;
            padding: 0;
        }

        th {
            margin: 0;
            padding: 0;
        }

        .badge {
            padding: 3px 5px;
            font-size: 75%;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
        }

        .panel {
            width: 400px;
        }

        .panel-success {
            border-color: #5cb85c;
            color: #ffffff;
            background-color: #5cb85c;
        }

        .panel-success-border {
            background-color: #ffffff;
            border: 1px solid #5cb85c;
        }

        .panel-success .badge {
            border: 1px solid #5cb85c;
            background-color: #636c72;
        }

        .panel-success-border .badge {
            background-color: #5cb85c;
        }

        .panel-success-border {
            color: #3c3f41;
            background-color: #c0c0c0;
        }

        .panel-warning {
            border-color: #f0ad4e;
            color: white;
            background-color: #f0ad4e;
        }

        .panel-warning .badge {
            border: 1px solid #f0ad4e;
            background-color: #636c72;
        }

        .panel-warning-border .badge {
            background-color: #f0ad4e;
        }

        .panel-error {
            color: #ffffff;
            background-color: #ac2925;
            border-color: #761c19;
        }

        .panel-error-border {
            background-color: #ffffff;
            border: 1px solid #761c19;
        }

        .panel-error .badge {
            border: 1px solid #ac2925;
            background-color: #636c72;
        }

        .panel-error-border .badge {
            background-color: #ac2925;
        }

        .badge-default {
            background-color: #636c72;
        }

        table {
            font-family: "Open Sans", sans-serif;
        }

        .market_heading {
            padding: 15px;
            height: 207px;
            width: 400px;
        }

        .agp_date, .agp_alert_type {
            font-size: 11px;
            vertical-align: middle;
            color: #ffffff;
            padding: 1px;
        }

        .market_name {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
        }

        .agp_date_summary_th {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            border-color: #FFFFFF #FFFFFF #FFFFFF #FFFFFF;
            border-style: none none solid none;
            border-width: 0 0 1px 0;
        }

        .agp_date_summary {
            font-size: 10px;
            color: #ffffff;
            vertical-align: middle;
            padding: 1px;
            border-left: 1px solid #ffffff;
            text-align: center;
        }

        .font-10 {
            font-size: 10px;
        }

        .system_status {
            color: #1d1e1f;
            padding: 4px;
            font-size: 13px;
            background-color: #dddddd;
        }

        .market_heading_table {
            height: 130px;
            width: 100%;


        }

        .market_agp_summary {
            height: 100px;
            width: 100%;

        }

        .date_col {
            border-color: #FFFFFF #FFFFFF #FFFFFF #FFFFFF;
            border-style: none solid solid none;
            border-width: 0 1px 1px 0;
            width: 100px;
        }

        .completed_col {
            border-color: #FFFFFF #FFFFFF #FFFFFF #FFFFFF;
            border-style: none solid solid none;
            border-width: 0 1px 1px 0;
            width: 200px;
        }

        .duration_col {
            border-color: #FFFFFF #FFFFFF #FFFFFF #FFFFFF;
            border-style: none solid solid none;
            border-width: 0 0 1px 0;
            width: 100px;
        }

    </style>
</head>
<body>

<table style="height: 100%; " align="center" cellpadding="0" cellspacing="5" width="400">
