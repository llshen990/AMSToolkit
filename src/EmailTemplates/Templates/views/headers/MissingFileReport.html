<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        .alert {
            color: #ffffff;
            background-color: #337ab7;
            border: 1px solid #3985b7;
            padding: 1px;
            vertical-align: middle;
            font-size: 12px;
        }

        .alert-danger {
            background-color: #f2dede;
            border: 1px solid #ebcccc;
            color: #a94442;
            padding: 1px;
            vertical-align: middle;
            font-size: 12px;
        }

        .alert-warning {
            background-color: #fcf8e3;
            border: 1px solid #faf2cc;
            color: #8a6d3b;
            padding: 1px;
            vertical-align: middle;
            font-size: 12px;
        }

        .alert-info {
            background-color: #d9edf7;
            border: 1px solid #bcdff1;
            color: #31708f;
            padding: 1px;
            vertical-align: middle;
            font-size: 12px;
        }

        .alert-success {
            color: #3c763d;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            padding: 1px;
            vertical-align: middle;
            font-size: 12px;
        }

        hr {
            width: 600px;
            color: #4b5257;
        }

        .summary-heading {
            padding: 1px;
            color: #ffffff;
            background-color: #444342;
            vertical-align: middle;
            font-size: 12px;
            text-align: center;
        }

        td {
            word-wrap: break-word;
            word-break: break-all;
            table-layout: fixed;
        }

    </style>
</head>
<body>
